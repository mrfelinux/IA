name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff mypy
      - name: Lint with ruff
        run: ruff check TEST-IA/tests/
      - name: Type check with mypy
        run: mypy TEST-IA/tests/
      - name: Test with pytest
        run: python -m pytest TEST-IA/tests/ -v
